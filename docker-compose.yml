version: '3.8'

services:
  # 메인 애플리케이션 서비스
  app:
    # build: . # 필요시 빌드 컨텍스트 지정
    image: ${APP_IMAGE_URI} # CI/CD 파이프라인에서 전달받는 이미지 URI
    container_name: ${APP_CONTAINER_NAME} # CI/CD 파이프라인에서 전달받는 이름
    ports:
      - "8080:8080"
    environment:
      # CI/CD 스크립트에서 전달하는 환경 변수들
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      # 로그 파일 경로 환경 변수
      # logback-spring.xml 에서 springProperty 로 읽도록 설정
      LOGGING_FILE_PATH: /var/log/app # 컨테이너 내부 로그 경로
      LOGGING_FILE_NAME: app # 로그 파일 이름
      # JWT Secret Key 등 추가 환경 변수
      JWT_SECRET_KEY: 2SELqxKueQ4uZpyzvqXECg00k9vSt7ioId2TwvyRDZk=
    volumes:
      # 컨테이너 내부의 로그 디렉토리를 볼륨으로 지정 (Filebeat와 공유 위함)
      - app-logs:/var/log/app
    networks:
      - app-network
    # restart: unless-stopped

  # Filebeat 서비스
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.4
    container_name: filebeat
    user: root # 호스트 로그 파일 접근 권한 필요 시 (여기서는 볼륨 사용)
    depends_on:
      - app # 앱 컨테이너가 먼저 시작되도록
    volumes:
      # 위에서 작성한 filebeat.yml 파일을 컨테이너 내부 설정 경로로 마운트
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # 앱 서비스와 동일한 로그 볼륨을 읽기 전용으로 마운트
      - app-logs:/var/log/app:ro
    networks:
      - app-network
    # restart: unless-stopped


volumes:
  app-logs: # 메인 앱과 Filebeat 간 로그 공유를 위한 명명된 볼륨

networks:
  app-network:
    driver: bridge