version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/mysql-connector-j-9.3.0.jar:/usr/share/logstash/mysql-connector-j-9.3.0.jar
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"

  auction-app:
    image: auction-app:dev
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://host.docker.internal:3306/AuctionMarket
      DB_USERNAME: root
      DB_PASSWORD: spartaSQL@3306

