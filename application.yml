server:
  port: 8080  # 애플리케이션 포트

spring:
  datasource:
    url: jdbc:mysql://mysql-db:3306/auction_test?serverTimezone=UTC&useSSL=false
    username: root
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # 개발 환경에서 사용, 배포 시에는 'none' 또는 'validate'로 설정
    show-sql: true
    properties:
      hibernate:
        format_sql: true

