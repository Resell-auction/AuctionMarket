name: CI/CD Pipeline for AuctionMarketApp

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build with Gradle
        run: ./gradlew build
      # 테스트 단계 추가 (예: ./gradlew test)

  deploy:
    needs: build-and-test # build-and-test Job 성공 시 실행
    runs-on: ubuntu-latest
    permissions: # OIDC 사용 시 필요
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS Credentials # OIDC 사용 예시
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT-ID:role/GitHubAction-DeployRole # 미리 생성된 IAM 역할 ARN
          aws-region: ${{ secrets.AWS_REGION }} # GitHub Secret 사용
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: auction-market-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      - name: Download task definition & Create new revision & Update ECS Service
        env:
          ECS_CLUSTER_NAME: my-spring-infra-cluster # Terraform에서 생성한 클러스터 이름
          ECS_SERVICE_NAME: my-spring-infra-service # Terraform에서 생성한 서비스 이름
          ECS_TASK_DEFINITION_FAMILY: my-spring-infra-app-task # Terraform에서 생성한 Task Definition 패밀리 이름
          CONTAINER_NAME: spring-app-1 # 업데이트할 컨테이너 이름
          ECR_REPO_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/auction-market-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 현재 Task Definition 가져오기
          aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION_FAMILY --query taskDefinition > task-definition.json

          # 새 이미지 URI로 업데이트하여 새 Task Definition 등록 (jq 사용 예시)
          # containerDefinitions 필드만 추출하여 새 파일로 저장 (등록 시 불필요 필드 제거 목적)
          jq '.containerDefinitions' task-definition.json > container-definitions.json
          # 이미지 URI 업데이트 (jq 복잡하므로 스크립트 사용 고려)
          # ... (sed 또는 다른 스크립트로 container-definitions.json 내 image 값 변경) ...
          # 예시: sed -i "s|image\": \"[^\"]*\"|image\": \"$ECR_REPO_URI:$IMAGE_TAG\"|g" container-definitions.json # 이 부분은 주의 필요

          # 위 스크립트 대신, 아래처럼 주요 정보만으로 새 Task Definition을 생성하는 것이 더 안정적일 수 있음
          # aws ecs register-task-definition --family $ECS_TASK_DEFINITION_FAMILY --cli-input-json file://updated-task-definition.json
          # -> 이 부분은 실제 구현 시 더 많은 스크립팅이 필요합니다.

          # ** 더 간편한 방법: aws ecs update-service --force-new-deployment 사용 (단, latest 태그 의존)**
          # 만약 항상 :latest 태그만 사용하고, 새 이미지가 푸시되면 자동으로 반영되길 원한다면,
          # Task Definition 업데이트 없이 아래 명령어로 강제 재배포만 할 수도 있습니다.
          # (단, Task Definition에 명시된 image가 '...:latest' 이어야 함)
           aws ecs update-service --cluster $ECS_CLUSTER_NAME --service $ECS_SERVICE_NAME --force-new-deployment

          # ** 권장 방식: 새 Task Definition 등록 후 서비스 업데이트 **
          # (위에 언급한 스크립팅 필요)
          # NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://updated-task-definition.json --query taskDefinition.taskDefinitionArn --output text)
          # aws ecs update-service --cluster $ECS_CLUSTER_NAME --service $ECS_SERVICE_NAME --task-definition $NEW_TASK_DEF_ARN