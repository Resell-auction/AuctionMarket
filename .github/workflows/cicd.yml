name: Java CI/CD with Gradle, Docker, AWS ECR & EC2 Docker Compose Deployment (Multi-Service)

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - main
      - dev
      - feat/cicd

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY_URI }}
  CONTAINER_NAME: auction-market
  APP_DIR_ON_EC2: /home/ec2-user/app


jobs:
  build-and-push-image:
    name: 작업1 - 도커 이미지 빌드 + ECR 푸시
    # 실행 환경 지정 (Ubuntu)
    runs-on: ubuntu-latest
    # 이 작업의 결과를 다른 작업에서 사용할 수 있도록 output 정의
    outputs:
      # 생성된 도커 이미지의 전체 URI 출력 => 작업간 데이터 전달
      image_uri: ${{ steps.build-image.outputs.image }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle 캐시 설정
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: AWS IAM 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: ECR 에 Docker 이미지 빌드 + 태그 + 푸시
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "이미지 빌드: $FULL_IMAGE_NAME"
          docker build -t $FULL_IMAGE_NAME .
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "이미지 PUSH: $FULL_IMAGE_NAME"
            docker push $FULL_IMAGE_NAME
          else
            echo "이미지 PUSH 스킵: ${{ github.event_name }} event."
          fi
          echo "image=$FULL_IMAGE_NAME" >> $GITHUB_OUTPUT

  deploy-to-ec2-compose:
    name: 작업2 - EC2 인스턴스에 SSH 로 배포
    runs-on: ubuntu-latest
    # 의존성 설정 => build-and-push-image 완료 후 실행
    needs: build-and-push-image
    # push 일 때만 실행 => PR 시에는 실행 안 함
    if: github.event_name == 'push'

    steps:
      - name: 코드 체크아웃 # 작업 환경에 소스 코드 (docker-compose.yml) 가져오기
        uses: actions/checkout@v4

      - name: AWS IAM 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: SCP 를 사용하여 docker-compose.yml 파일을 EC2 인스턴스로 복사
        uses: appleboy/scp-action@v0.1.7 # SCP 액션 사용
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml" # 복사할 소스
          target: "${{ env.APP_DIR_ON_EC2 }}"

      - name: SSH 를 통해 EC2 인스턴스에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APP_IMAGE_URI: ${{ needs.build-and-push-image.outputs.image_uri }}
          # AWS_REGION_ENV: ${{ env.AWS_REGION }}
          APP_DIR: ${{ env.APP_DIR_ON_EC2 }}
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # AWS_REGION 값, ECR_REGISTRY 값 직접 설정
            AWS_REGION_FOR_SCRIPT="${{ env.AWS_REGION }}"
            ECR_REGISTRY_FOR_SCRIPT="${{ env.ECR_REGISTRY }}"
            
            # docker-compose.yml 파일이 있는 디렉토리로 이동
            echo "$APP_DIR 디렉토리로 이동 중..."
            cd $APP_DIR
            if [ $? -ne 0 ]; then
              echo "$APP_DIR 디렉토리로 이동하는 데 실패했습니다. SCP 단계를 확인하고, APP_DIR_ON_EC2 환경 변수 값이 올바른지 확인하세요."
              exit 1
            fi
            
            # 디버깅용
            # echo "DEBUG: AWS_REGION_ENV 변수 값 확인: '$AWS_REGION_ENV'"
            echo "DEBUG: AWS_REGION_ENV 변수 값 확인: '$AWS_REGION_FOR_SCRIPT'"
            echo "DEBUG: ECR_REGISTRY_FOR_SCRIPT 변수 값 확인: '$ECR_REGISTRY_FOR_SCRIPT'"
            
            # AWS CLI 를 사용하여 ECR 에 Docker 로그인
            echo "ECR 로그인 중..."
            # aws ecr get-login-password --region $AWS_REGION_ENV | docker login --username AWS --password-stdin $ECR_REGISTRY
            aws ecr get-login-password --region $AWS_REGION_FOR_SCRIPT | docker login --username AWS --password-stdin $ECR_REGISTRY_FOR_SCRIPT
            if [ $? -ne 0 ]; then
              echo "ECR 로그인 실패: $ECR_REGISTRY_FOR_SCRIPT"
              exit 1
            fi
            
            # Docker Compose 를 사용하여 최신 이미지 Pull
            echo "docker-compose.yml 최신 이미지를 가져오는 중..."
            export APP_IMAGE_URI=$APP_IMAGE_URI # 환경 변수 export
            docker-compose pull
            if [ $? -ne 0 ]; then
              echo "Docker Compose pull 실패"
              exit 1
            fi
            
            # 기존에 실행 중이던 애플리케이션 컨테이너 중지 + 제거
            echo "docker-compose.yml 기존 컨테이너를 중지하고 제거하는 중..."
            docker-compose down
            
            # 새로운 버전의 컨테이너 실행
            echo "docker-compose.yml 새 컨테이너를 시작하는 중..."
            docker-compose up -d
            if [ $? -ne 0 ]; then
              echo "Docker Compose up failed!"
              exit 1
            fi
            
            # 오래된 Docker 이미지 정리
            echo "오래된 도커 이미지 정리 중..."
            docker image prune -af
            
            echo "Docker Compose 를 통한 배포가 성공적으로 완료되었습니다!"