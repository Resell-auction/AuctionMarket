name: Java CI/CD with Gradle, Docker, AWS ECR & EC2 Docker Compose Deployment (Multi-Service)

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - main
      - dev
      - feat/cicd

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY_URI }}
  CONTAINER_NAME: auction-market
  APP_DIR_ON_EC2: /home/ec2-user/app

jobs:
  build-and-push-image:
    name: 작업1 - 도커 이미지 빌드 + ECR 푸시
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-image.outputs.image }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1234
          MYSQL_DATABASE: auction_market
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli -h 127.0.0.1 ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle 캐시 설정
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 테스트 실행
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/auction_market
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: 1234
          SPRING_DATA_REDIS_HOST: 127.0.0.1
          SPRING_DATA_REDIS_PORT: 6379
        run: ./gradlew test

      - name: AWS IAM 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 + 태그 + ECR 에 푸시
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "이미지 빌드: $FULL_IMAGE_NAME"
          docker build -t $FULL_IMAGE_NAME .
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "이미지 PUSH: $FULL_IMAGE_NAME"
            docker push $FULL_IMAGE_NAME
          else
            echo "이미지 PUSH 스킵: ${{ github.event_name }} event."
          fi
          echo "image=$FULL_IMAGE_NAME" >> $GITHUB_OUTPUT

  deploy-to-ec2-compose:
    name: 작업2 - EC2 인스턴스에 SSH 로 배포
    runs-on: ubuntu-latest
    # 의존성 설정 => build-and-push-image 완료 후 실행
    needs: build-and-push-image
    # push 일 때만 실행 => PR 시에는 실행 안 함
    if: github.event_name == 'push'

    steps:
      - name: 코드 체크아웃 # 작업 환경에 소스 코드 (docker-compose.yml) 가져오기
        uses: actions/checkout@v4

      - name: AWS IAM 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: SCP 를 사용하여 docker-compose.yml 파일을 EC2 인스턴스로 복사
        uses: appleboy/scp-action@v0.1.7 # SCP 액션 사용
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml" # 복사할 소스
          target: "${{ env.APP_DIR_ON_EC2 }}"

      - name: SSH 를 통해 EC2 인스턴스에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APP_IMAGE_URI: ${{ needs.build-and-push-image.outputs.image_uri }}
          AWS_REGION: ${{ env.AWS_REGION }}
          APP_DIR: /home/ec2-user/app
        with:
#          envs: |
#            ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
#            APP_IMAGE_URI=${{ needs.build-and-push-image.outputs.image_uri }}
#            AWS_REGION=${{ secrets.AWS_REGION }}
#            APP_DIR=/home/ec2-user/app
#          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 값 확인 디버깅용
            echo "DEBUG: APP_DIR = '$APP_DIR'"
            
            # 값 강제 할당
            APP_DIR="/home/ec2-user/app"
            
            # 값 확인 디버깅용
            echo "DEBUG: APP_DIR = '$APP_DIR'"
            echo "DEBUG: ECR_REGISTRY = '$ECR_REGISTRY'"
            echo "DEBUG: AWS_REGION = '$AWS_REGION'"
            echo "DEBUG: APP_IMAGE_URI = '$APP_IMAGE_URI'"
            
            
            # docker-compose.yml 파일이 있는 디렉토리로 이동
            echo "$APP_DIR 디렉토리로 이동 중..."
            # cd $APP_DIR
            cd $APP_DIR && echo "성공: $APP_DIR 로 이동 완료. 현재 위치: $(pwd)" || { echo "$APP_DIR 로 이동 실패"; exit 1; }
            
            echo "$APP_DIR 디렉토리 내용 확인"
            ls -al
            
            echo "docker-compose.yml 파일 존재 확인 시도"
            if [ -f "docker-compose.yml" ]; then
              echo "성공: docker-compose.yml 파일을 현재 디렉토리에서 찾았습니다."
            else
              echo "실패: docker-compose.yml 파일을 현재 디렉토리에서 찾을 수 없습니다!"
              echo "SCP 단계 성공 여부 및 $APP_DIR 경로 확인 필요."
              exit 1
            fi            
            
            # docker-compose.yml 디버깅용
            echo "현재 작업 디렉토리: $(pwd)"
            echo "$APP_DIR 디렉토리 내용 확인"
            ls -al
            echo "docker-compose.yml 파일 존재 확인 시도"
            if [ -f "docker-compose.yml" ]; then
              echo "성공: docker-compose.yml 파일을 현재 디렉토리에서 찾았습니다."
            else
              echo "실패: docker-compose.yml 파일을 현재 디렉토리에서 찾을 수 없습니다."
              echo "SCP 단계가 성공했는지 확인하세요."
              exit 1 # 파일을 못 찾으면 더 진행할 수 없으므로 여기서 종료
            fi
            
            
            # AWS CLI 를 사용하여 ECR 에 Docker 로그인
            echo "ECR 로그인 중..."
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            if [ $? -ne 0 ]; then
              echo "ECR 로그인 실패: $ECR_REGISTRY"
              exit 1
            fi
            
            # Docker Compose 를 사용하여 최신 이미지 Pull
            echo "docker-compose.yml 최신 이미지를 가져오는 중..."
            export APP_IMAGE_URI=$APP_IMAGE_URI # 환경 변수 export
            docker-compose pull
            if [ $? -ne 0 ]; then
              echo "Docker Compose pull 실패"
              exit 1
            fi
            
            # 기존에 실행 중이던 애플리케이션 컨테이너 중지 + 제거
            echo "docker-compose.yml 기존 컨테이너를 중지하고 제거하는 중..."
            docker-compose down
            
            # 새로운 버전의 컨테이너 실행
            echo "docker-compose.yml 새 컨테이너를 시작하는 중..."
            docker-compose up -d
            if [ $? -ne 0 ]; then
              echo "Docker Compose up failed!"
              exit 1
            fi
            
            # 오래된 Docker 이미지 정리
            echo "오래된 도커 이미지 정리 중..."
            docker image prune -af
            
            echo "Docker Compose 를 통한 배포가 성공적으로 완료되었습니다!"