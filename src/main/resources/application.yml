spring:
  application:
    name: AuctionMarket

    # 기존 MySQL 연결 설정 => EC2에서 의존받게 변경 (url, 유저네임은 그냥 여기서 사용, 비밀번호만 .env 의존)
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/auction_market
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    # JPA, Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: create # 테스트용
#      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

  # 기존 Redis 설정 => EC2에서 의존받게 변경
